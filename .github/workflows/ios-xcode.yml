name: iOS Xcode Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  simulator-build:
    name: Simulator build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List schemes
        run: |
          xcodebuild -list -project StormClaimAI.xcodeproj

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project StormClaimAI.xcodeproj \
            -scheme StormClaimAI \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
          if-no-files-found: ignore
