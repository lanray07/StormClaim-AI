name: iOS Xcode Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  simulator-build:
    name: Simulator build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List schemes
        run: |
          xcodebuild -list -project StormClaimAI.xcodeproj

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          LOG_PATH="$RUNNER_TEMP/xcodebuild.log"
          xcodebuild \
            -project StormClaimAI.xcodeproj \
            -scheme StormClaimAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee "$LOG_PATH"

          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "Xcode build failed. Last 200 log lines:"
            tail -200 "$LOG_PATH"
            while IFS= read -r line; do
              escaped="${line//'%'/'%25'}"
              escaped="${escaped//$'\n'/'%0A'}"
              escaped="${escaped//$'\r'/'%0D'}"
              echo "::error::$escaped"
            done < <(tail -80 "$LOG_PATH")
            exit "$status"
          fi

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
          if-no-files-found: ignore
